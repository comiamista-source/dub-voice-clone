name: Voice Clone Chunks

# Free voice-cloning dubber (no Sarvam). Reads chunks from Dubz/Chunks, clones
# the speaker's voice with XTTS-v2, outputs to Dubz/ChunksDone. Each chunk = its
# own matrix job. Manual run only.
# Secret: RCLONE_CONF (required).

on:
  workflow_dispatch:
    inputs:
      src:
        description: "Source language code (whisper/argos, e.g. hi)"
        default: "hi"
      target:
        description: "Target language code (e.g. en)"
        default: "en"
      model:
        description: "Whisper model (large-v3 best, base faster)"
        default: "large-v3"
      chunks_dir:
        description: "Drive folder with chunks"
        default: "Dubz/Chunks"
      done_dir:
        description: "Drive folder for cloned output"
        default: "Dubz/ChunksDone"

concurrency:
  group: voice-clone-${{ github.run_id }}
  cancel-in-progress: false

env:
  SRC: ${{ github.event.inputs.src || 'hi' }}
  TGT: ${{ github.event.inputs.target || 'en' }}
  MODEL: ${{ github.event.inputs.model || 'large-v3' }}
  CHUNKS_DIR: ${{ github.event.inputs.chunks_dir || 'Dubz/Chunks' }}
  DONE_DIR: ${{ github.event.inputs.done_dir || 'Dubz/ChunksDone' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      count: ${{ steps.build.outputs.count }}
    steps:
      - name: Connect Drive
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          if [ -z "$RCLONE_CONF" ]; then echo "::error::RCLONE_CONF not set"; exit 1; fi
          curl -fsSL https://rclone.org/install.sh | sudo bash >/dev/null 2>&1
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
      - name: Build matrix
        id: build
        run: |
          rclone lsf "gdrive:${CHUNKS_DIR}" --files-only > all.txt 2>/dev/null || true
          grep -iE '\.(mp4|mkv|mov|webm|avi|m4v|ts)$' all.txt > chunks.txt || true
          COUNT=$(grep -c . chunks.txt 2>/dev/null || true); COUNT=${COUNT:-0}
          echo "Found $COUNT chunk(s):"; cat chunks.txt || true
          ITEMS=$(jq -R -s -c 'split("\n") | map(select(length>0)) | .[0:1] | map({ref: .})' chunks.txt)
          echo "matrix={\"item\":$ITEMS}" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

  clone:
    needs: scan
    if: ${{ needs.scan.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.scan.outputs.matrix) }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg jq >/dev/null
          curl -fsSL https://rclone.org/install.sh | sudo bash >/dev/null 2>&1
          python3 -m pip install -q --upgrade pip
          # torch 2.8 keeps the torchaudio audio backend (NO torchcodec / no GPU libs
          # needed). Plain coqui-tts (not [codec]) avoids the torchcodec import.
          python3 -m pip install -q "torch==2.8.0" "torchaudio==2.8.0" --index-url https://download.pytorch.org/whl/cpu
          python3 -m pip install -q "coqui-tts==0.26.0" "transformers==4.47.1" sentencepiece click "spacy>=3.2,<3.8"
      - name: Connect Drive
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
      - name: Get chunk
        id: get
        env:
          REF: ${{ matrix.item.ref }}
        run: |
          mkdir -p input output
          if ! rclone lsf "gdrive:${CHUNKS_DIR}/${REF}" >/dev/null 2>&1; then
            echo "::notice::${REF} gone - skip"; echo "have=no" >> "$GITHUB_OUTPUT"; exit 0
          fi
          rclone copy "gdrive:${CHUNKS_DIR}/${REF}" input/ --drive-chunk-size 64M -v
          echo "have=yes" >> "$GITHUB_OUTPUT"
      - name: Clone voice + dub
        if: steps.get.outputs.have == 'yes'
        env:
          REF: ${{ matrix.item.ref }}
          COQUI_TOS_AGREED: "1"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: "60"
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
        run: |
          IN=$(ls input/ | head -n1)
          echo "==> Cloning: $IN"
          python clone_chunk.py "input/$IN" --src "$SRC" --target "$TGT" \
            --model "$MODEL" --out "output/$IN" || true
      - name: Upload result + archive
        if: steps.get.outputs.have == 'yes'
        env:
          REF: ${{ matrix.item.ref }}
        run: |
          if [ -n "$(ls -A output/ 2>/dev/null)" ]; then
            rclone copy output/ "gdrive:${DONE_DIR}" --transfers 2 --drive-chunk-size 64M -v
            rclone moveto "gdrive:${CHUNKS_DIR}/${REF}" "gdrive:${CHUNKS_DIR}/archive/${REF}" -v || true
            echo "==> ${REF} cloned -> ${DONE_DIR}"
          else
            echo "::warning::${REF} produced no output."
          fi
      - name: Backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloned-${{ strategy.job-index }}
          path: output/
          if-no-files-found: ignore